<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="home">
    <main class="main">
        <div class="container">
            <div class="row">
                <section class="section section-content">
                    <div class="left-box">
                        <div class="image-wrapper">
                            <img src="assets/images/image.png" alt="Instagram Left Side Image" width="570" height="492">
                        </div>
                    </div>
                    <div class="right-box">
                        <div class="image-wrapper">
                            <!-- <img src="assets/images/logo.png" alt="Instagram Logo" width="175" height="51"> -->
                            <span class="logo">&nbsp;</span>
                        </div>
                        <div class="form-section">
                            <form action="">
                                <fieldset>
                                    <div class="form-grounp">
                                        <input type="text" id="" name="" tabindex="1" placeholder="Phone number, username, or email">
                                    </div>
                                    <div class="form-grounp">
                                        <input type="password" id="" name="" tabindex="2" placeholder="password">
                                    </div>
                                    <div class="form-grounp action-btn">
                                        <button class="">Log In</button>
                                    </div>
                                </fieldset>
                            </form>
                        </div>
                        <div class="seprator-box">
                            <div class="seprator-txt">OR</div>
                        </div>
                        <div class="">
                            <div class="icon-box"> 
                                <a href="" target="_blank">
                                    <div class="image-wrapper">
                                        <img src="assets/images/facebook.webp" alt="Facebook Logo" width="20" height="20">
                                    </div>
                                    Log in with Facebook
                                </a>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>
</body>
</html>
