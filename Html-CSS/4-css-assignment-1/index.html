<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <meta name="robots" content="noindex, nofollow">
</head>

<body>
    <div class="calculator-box">
        <div class="main-field"><input type="number" id="" name="" tabindex="1"></div>
        <div class="small-fields">
            <button type="text" id="" name="" tabindex="2">7</button>
            <button type="text" id="" name="" tabindex="3">8</button>
            <button type="text" id="" name="" tabindex="4">9</button>
            <button type="text" id="" name="" tabindex="5">/</button>
            <button type="text" id="" name="" tabindex="6">4</button>
            <button type="text" id="" name="" tabindex="7">5</button>
            <button type="text" id="" name="" tabindex="8">6</button>
            <button type="text" id="" name="" tabindex="9">*</button>
            <button type="text" id="" name="" tabindex="10">1</button>
            <button type="text" id="" name="" tabindex="11">2</button>
            <button type="text" id="" name="" tabindex="12">3</button>
            <button type="text" id="" name="" tabindex="13">-</button>
            <button type="text" id="" name="" tabindex="14">.</button>
            <button type="text" id="" name="" tabindex="15">0</button>
            <button type="text" id="" name="" tabindex="16">+</button>
            <button type="text" id="" name="" tabindex="17" class="bg-red">C</button>
            <button type="text" id="" name="" tabindex="18" class="full-width">=</button>
        </div>
    </div>
</body>

</html>
