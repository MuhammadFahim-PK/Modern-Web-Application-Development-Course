<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - ABC Company</title>
    <link rel="stylesheet" href="assets/css/style.css?v=1.0.0">
    <meta name="robots" content="noindex, nofollow">
</head>

<body>
    <main class="main">
        <div class="section section-hero">
            <div class="container">
                <div class="row">
                    <div class="col-50">
                        <div class="generic-panel">
                            <div class="generic-tag-box">
                                <div class="img-wrapper">&nbsp;</div>
                                <span>devchallenges.io</span>
                            </div>
                            <div class="generic-title">Responsive Web Developer Project</div>
                            <div class="generic-heading">
                                <h1>Business <span>Blog card</span></h1>
                            </div>
                            <div class="generic-tags-list">
                                <ul>
                                    <li>Html</li>
                                    <li>CSS</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-50">
                        <article class="card">
                            <div class="card-wrapper">
                                <div class="card-img-wrapper">
                                    <img src="./assets/images/bg.jpg" alt="Card Image" width="" height="350">
                                </div>
                                <div class="card-content">
                                    <!-- <div class="card-category">Article</div> -->
                                    <h2 class="card-title">What is the difference between UI and UX Design</h2>
                                    <p class="card-description">UI design is about the visual part of the product while
                                        UX
                                        design is about the overall feel of the experience.</p>
                                    <div class="card-author-info">
                                        <div class="author-avatar-wrapper">
                                            <img src="./assets/images/bg.jpg" alt="Author Avatar" width="" height="100">
                                        </div>
                                        <div class="author-details">
                                            <div class="author-name">Michelle Park</div>
                                            <!-- <div class="publish-date">Jan 28, 2022 · 10 min read</div> -->
                                            <div class="author-role">customer manager, suluction oy</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
