<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <meta name="robots" content="noindex, nofollow">
</head>

<body>
    <h1 style="display: block; text-align : center">Registration Form</h1>
    <a href="/" style="display: block; text-align : center">Back</a> <br /><br />
    <form action="#" method="post" enctype="multipart/form-data">
        <table border="1" cellspacing="0" cellpadding="10" width="50%" bordercolor="#000000" align="center"
            bgcolor="#d3d3d3">
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        <label for="firstName">Enter your first name:</label>
                    </span>
                </td>
                <td>
                    <input type="text" name="firstName" id="firstName" placeholder="enter your first name" tabindex="1"
                        style="width: 80%; padding: 15px;">
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        <label for="lastName">Enter your last name:</label>
                    </span>
                </td>
                <td>
                    <input type="text" name="lastName" id="lastName" placeholder="enter your last name" tabindex="2"
                        style="width: 80%; padding: 15px;">
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        <label for="password">Enter your password:</label>
                    </span>
                </td>
                <td>
                    <input type="password" name="password" id="password" placeholder="enter your password" tabindex="3"
                        style="width: 80%; padding: 15px;">
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        <label for="rePassword">Re-enter your password:</label>
                    </span>
                </td>
                <td>
                    <input type="password" name="rePassword" id="rePassword" placeholder="re-enter your password"
                        tabindex="4" style="width: 80%; padding: 15px;">
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        <label for="email">Enter your email:</label>
                    </span>
                </td>
                <td>
                    <input type="email" name="email" id="email" placeholder="enter your email" tabindex="5"
                        style="width: 80%; padding: 15px;">
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        <label for="mobileNumber">Enter your mobile number:</label>
                    </span>
                </td>
                <td>
                    <input type="tel" name="mobileNumber" id="mobileNumber" placeholder="enter your mobile number"
                        tabindex="6" style="width: 80%; padding: 15px;">
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        <label for="address">Enter your Address:</label>
                    </span>
                </td>
                <td>
                    <textarea name="address" id="address" placeholder="enter your address" tabindex="7"
                        style="width: 80%; padding: 15px;" rows="4"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        Select your gender
                    </span>
                </td>
                <td>
                    <label for="male">Male</label>
                    <input type="radio" name="gender" id="male" value="male" tabindex="8">
                    <label for="female">Female</label>
                    <input type="radio" name="gender" id="female" value="female" tabindex="9">
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        <label for="hobbies">Select your hobbies:</label>
                    </span>
                </td>
                <td>
                    <label for="hobbies-one">Hobby 1</label>
                    <input type="checkbox" name="hobbies" id="hobbies-one" value="hobby-one" tabindex="10">
                    <label for="hobbies-two">Hobby 2</label>
                    <input type="checkbox" name="hobbies" id="hobbies-two" value="hobby-two" tabindex="11">
                    <label for="hobbies-three">Hobby 3</label>
                    <input type="checkbox" name="hobbies" id="hobbies-three" value="hobby-three" tabindex="12">
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        Select your DOB
                    </span>
                </td>
                <td>
                    <input type="date" name="dob" id="dob" placeholder="select your date of birth" tabindex="13"
                        style="width: 80%; padding: 15px;" rows="4"></input>
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        Select your Country
                    </span>
                </td>
                <td>
                    <select name="country" id="country" tabindex="14" style="width: 80%; padding: 15px;">
                        <option value="country-1">Country 1</option>
                        <option value="country-2">Country 2</option>
                        <option value="country-3">Country 3</option>
                        <option value="country-4">Country 4</option>
                </td>
            </tr>
            <tr>
                <td>
                    <span style="color: #000000; font-size: 18px; font-family: Arial, sans-serif;">
                        Upload your pic
                    </span>
                </td>
                <td>
                    <input type="file" name="picUpload" id="picUpload" tabindex="15" style="width: 80%; padding: 15px;">
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <button type="submit" tabindex="16"
                        style="width: 250px; padding: 15px; font-size: 20px; background-color: #3d3d3d; color: white; border: none; cursor: pointer;">
                        Save my Data
                    </button>
                    <button type="reset" tabindex="17"
                        style="width: 250px; padding: 15px; font-size: 20px; background-color: #a9a9a9; color: white; border: none; cursor: pointer;">
                        Reset Data
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
